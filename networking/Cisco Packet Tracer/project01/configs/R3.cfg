! Cisco Router R3 - 1941 ISR Configuration
!
interface GigabitEthernet0/0
 ip address 172.16.51.133 255.255.255.252
 ip ospf authentication message-digest
 ip ospf authentication-key cisco
 ip ospf message-digest-key 1 md5 cisco
 ip ospf network point-to-point
 duplex auto
 speed auto
!
interface GigabitEthernet0/1
 no ip address
 duplex auto
 speed auto
!
interface GigabitEthernet0/1.10
 encapsulation dot1Q 10
 ip address 172.16.32.1 255.255.240.0
!
interface GigabitEthernet0/1.20
 encapsulation dot1Q 20
 ip address 172.16.50.1 255.255.255.0
!
interface GigabitEthernet0/1.99
 encapsulation dot1Q 99
 ip address 172.16.1.1 255.255.255.0
!
interface Serial0/0/0
 ip address 172.16.51.130 255.255.255.252
 ip ospf authentication message-digest
 ip ospf authentication-key cisco
 ip ospf message-digest-key 1 md5 cisco
 clock rate 2000000
!
router ospf 10
 router-id 3.3.3.3
 log-adjacency-changes
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface Serial0/0/0
 network 172.16.51.128 0.0.0.3 area 0
 network 172.16.51.132 0.0.0.3 area 0
 network 172.16.32.0 0.0.15.255 area 0
 network 172.16.50.0 0.0.0.255 area 0
!
