enable
config t
hostname CORE1
vlan 301
name WIRELESS
vlan 95
name NETLAB
vlan 34
name FACULTY
vlan 36
name SERVERS
vlan 199
name NATIVE
exit

interface range Gig1/0/2,Gig1/0/23,Gig1/0/22
switchport mode access
switchport access vlan 36
spanning-tree portfast
spanning-tree bpduguard enable
switchport port-security
switchport port-security maximum 1
switchport port-security mac-address sticky
exit

interface range Gig1/0/10,Gig1/0/11-12
switchport mode trunk
switchport trunk native vlan 199
switchport trunk allowed vlan 34,36,95,199,301
exit

interface range Gig1/0/15-16
shutdown
channel-protocol pagp
channel-group 1 mode desirable
no shutdown
exit

interface port-channel 1
switchport mode trunk
switchport trunk native vlan 199
switchport trunk allowed vlan 34,36,95,199,301
exit

interface vlan 34
ip address 10.23.42.255 255.255.252.0
ip helper-address 10.23.44.5
standby version 2
standby 34 ip 10.23.43.254
standby 34 priority 255
standby 34 preempt
exit

interface vlan 36
ip address 10.23.44.61 255.255.255.192
standby version 2
standby 36 ip 10.23.44.62
standby 36 priority 255
standby 36 preempt
exit

interface vlan 95
ip address 10.23.38.255 255.255.248.0
ip helper-address 10.23.44.5
standby version 2
standby 95 ip 10.23.39.254
standby 95 priority 255
standby 95 preempt
exit

interface vlan 199
ip address 10.23.44.80 255.255.255.224
standby version 2
standby 199 ip 10.23.44.85
standby 199 priority 255
standby 199 preempt
exit

interface vlan 301
ip address 10.23.30.255 255.255.224.0
ip helper-address 10.23.44.5
standby version 2
standby 301 ip 10.23.31.254
standby 301 priority 200
standby 301 preempt
exit

ip routing

interface G1/0/1
no switchport
ip address 172.20.19.2 255.255.255.252
no shutdown
exit

ip route 0.0.0.0 0.0.0.0 172.20.19.1

spanning-tree mode rapid-pvst
spanning-tree vlan 34,36,95,199 root primary
spanning-tree vlan 301 root secondary
