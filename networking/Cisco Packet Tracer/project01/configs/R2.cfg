! Cisco Router R2 - 1941 ISR Configuration
!
interface GigabitEthernet0/0
 ip address 172.16.51.134 255.255.255.252
 ip ospf authentication message-digest
 ip ospf authentication-key cisco
 ip ospf message-digest-key 1 md5 cisco
 ip ospf network point-to-point
 duplex auto
 speed auto
!
interface GigabitEthernet0/1
 ip address 172.16.48.1 255.255.254.0
 duplex auto
 speed auto
!
ip dhcp excluded-address 172.16.48.1 172.16.48.44
!
ip dhcp pool LAN-C
 network 172.16.48.0 255.255.254.0
 default-router 172.16.48.1
 dns-server 8.8.8.8
!
router ospf 10
 router-id 2.2.2.2
 log-adjacency-changes
 passive-interface default
 no passive-interface GigabitEthernet0/0
 network 172.16.51.132 0.0.0.3 area 0
 network 172.16.48.0 0.0.1.255 area 0
!
