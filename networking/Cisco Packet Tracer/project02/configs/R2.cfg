! Cisco Router R2 - 1941 ISR Configuration
!
interface GigabitEthernet0/0
 no ip address
 no shutdown
!
interface GigabitEthernet0/0.25
 encapsulation dot1Q 25
 ip address 172.16.48.254 255.255.255.0
!
interface GigabitEthernet0/0.94
 encapsulation dot1Q 94
 ip address 172.16.47.254 255.255.240.0
!
interface GigabitEthernet0/0.99
 encapsulation dot1Q 99
 ip address 172.16.31.254 255.255.224.0
!
interface Serial0/0/0
 ip address 10.0.24.2 255.255.255.252
 ip ospf message-digest-key 1 md5 NETLABSEC
 ip ospf authentication message-digest
!
ip dhcp pool IT-DEPT
 network 172.16.32.0 255.255.240.0
 default-router 172.16.47.254
 dns-server 34.89.200.52
!
ip dhcp pool SALES-DEPT
 network 172.16.48.0 255.255.255.0
 default-router 172.16.48.254
 dns-server 34.89.200.52
!
router OSPF 3400
 router-id 2.2.2.2
 area 0 authentication message-digest
 passive-interface default
 no passive-interface Serial0/0/0
 network 10.0.24.0 0.0.0.3 area 0
 network 172.16.0.0 0.0.31.255 area 0
 network 172.16.32.0 0.0.15.255 area 0
 network 172.16.48.0 0.0.0.255 area 0
!
