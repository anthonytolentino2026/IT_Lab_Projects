enable
[ENTER]
config t
hostname FW1

interface Gig1/1
description LINK-TO-ISP1
nameif outside
security-level 0
ip address 203.0.113.6 255.255.255.252
no shutdown
exit

interface G1/3
description LINK-TO-CORE1
nameif inside
security-level 100
ip address 172.20.19.1 255.255.255.252
no shutdown
exit

object network inside-outside
subnet 10.23.0.0 255.255.192.0
nat (inside,outside) dynamic interface

class-map inspection_default
match default-inspection-traffic

policy-map global_policy
class inspection_default
inspect icmp
exit

service-policy global_policy global

route outside 0.0.0.0 0.0.0.0 203.0.113.5
route inside 10.23.0.0 255.255.192.0 172.20.19.2
