! Cisco Router R1 - 1941 ISR Configuration
!
interface GigabitEthernet0/0
 ip address 172.16.0.1 255.255.224.0
 duplex auto
 speed auto
!
interface GigabitEthernet0/1
 ip address 172.16.51.1 255.255.255.128
 duplex auto
 speed auto
!
interface Serial0/0/0
 ip address 172.16.51.129 255.255.255.252
 ip ospf authentication message-digest
 ip ospf authentication-key cisco
 ip ospf message-digest-key 1 md5 cisco
!
ip dhcp excluded-address 172.16.0.1 172.16.25.199
ip dhcp excluded-address 172.16.51.1 172.16.51.57
!
ip dhcp pool LAN-A
 network 172.16.0.0 255.255.224.0
 default-router 172.16.0.1
 dns-server 8.8.8.8
!
ip dhcp pool LAN-B
 network 172.16.51.0 255.255.255.128
 default-router 172.16.51.1
 dns-server 8.8.8.8
!
router ospf 10
 router-id 1.1.1.1
 log-adjacency-changes
 passive-interface default
 no passive-interface Serial0/0/0
 network 172.16.51.128 0.0.0.3 area 0
 network 172.16.0.0 0.0.31.255 area 0
 network 172.16.51.0 0.0.0.127 area 0
!
